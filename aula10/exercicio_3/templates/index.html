<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas de notas</title>
</head>

<body>
    <h2>Sistemas de notas, utilizando lista(Array)</h2>
    <form action="/calcular" method="post">
        <label>
            Nome do aluno: <br>
            <input type="text" name="nome" required>
        </label>
        <br>
        <label>
            Nome da turma: <br>
            <input type="text" name="turma" required>
        </label>
        <br>
        <label>
            Primeira nota:<br>
            <input type="number" name="nota1" step="0.1" required>
        </label>
        <br>
        <label>
            Segunda nota:<br>
            <input type="number" name="nota2" step="0.1" required>
        </label>
        <br>
        <label>
            Terceira nota:<br>
            <input type="number" name="nota3" step="0.1" required>
        </label>
        <br>
        <label>
            Quarta nota:<br>
            <input type="number" name="nota4" step="0.1" required>
        </label>
        <br>
        <label>
            Quinta nota:<br>
            <input type="number" name="nota5" step="0.1" required>
        </label>
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>

</html>
