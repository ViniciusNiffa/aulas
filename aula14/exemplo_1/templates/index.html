<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folha de pagamento</title>
</head>
<body>
    <h2>Folha de pagamento do funcionário</h2>
    <form method="post">
        Nome:
        <input type="text" name="nome" required>
        <br>
        Valor da hora trabalhada R$ <input type="number" step="0.1" name="valor_hora" required> <br>
        Horas trabalhadas no mês: <input type="number" step="0.1" name="horas" required> <br>
        Vale alimentação recebido R$ <input type="number" step="0.1" name="vale_alimentacao" required> <br>
        Vale transporte recebido R$ <input type="number" step="0.1" name="vale_transporte" required> <br>
        <button type="submit">Calcular</button>
    </form>
</body>
</html>
